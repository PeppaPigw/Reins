services:
  reins-pipeline:
    build:
      context: ..
      dockerfile: docker/Dockerfile.pipeline
    working_dir: /app
    volumes:
      - ../.reins/tasks/ci-test:/app/.reins/tasks/ci-test
      - ./output:/app/.reins/ci-output
    command:
      [
        ".reins/pipelines/standard.yaml",
        "--task-dir",
        ".reins/tasks/ci-test",
        "--output",
        ".reins/ci-output"
      ]
